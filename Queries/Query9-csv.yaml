query: |
  SELECT start,
         end,
         device_id,
         KNN_AGG(mindist, device_id2, 3) AS neighbors
  FROM (
      SELECT
        device_id,
        time_utc,
        device_id2,
        nearestApproachDistance(gps_lon,
                                gps_lat,
                                time_utc,
                                gps_lon2,
                                gps_lat2,
                                time_utc2) AS mindist
      FROM (
          SELECT time_utc,
                 device_id,
                 gps_lat,
                 gps_lon
          FROM sncb_stream
    )
    INNER JOIN (
        -- Keep TIME_UTC in the projected schema so the event-time watermark assigner
        -- (driven by WINDOW(... time_utc ...)) can infer the timestamp field.
        SELECT time_utc,
               time_utc  AS time_utc2,
               device_id AS device_id2,
               gps_lat   AS gps_lat2,
               gps_lon   AS gps_lon2
        FROM sncb_stream2
    )
    ON (time_utc = time_utc2)
    WINDOW TUMBLING (time_utc, SIZE 10 SEC)
    WHERE device_id != device_id2
  ) AS joined_pairs
  GROUP BY device_id
  WINDOW TUMBLING (time_utc, SIZE 10 SEC)
  INTO file_sink;

sinks:
  - name: FILE_SINK
    type: File
    schema:
      - { name: SNCB_STREAM$START,      type: UINT64 }
      - { name: SNCB_STREAM$END,        type: UINT64 }
      - { name: SNCB_STREAM$DEVICE_ID,  type: UINT64 }
      - { name: NEIGHBORS,              type: VARSIZED }
    config:
      file_path: "/workspace/Output/output_query9.csv"
      input_format: CSV

logical:
  - name: SNCB_STREAM
    schema:
      - { name: TIME_UTC,   type: UINT64 }
      - { name: DEVICE_ID,  type: UINT64 }
      - { name: VBAT,       type: FLOAT64 }
      - { name: PCFA_MBAR,  type: FLOAT64 }
      - { name: PCFF_MBAR,  type: FLOAT64 }
      - { name: PCF1_MBAR,  type: FLOAT64 }
      - { name: PCF2_MBAR,  type: FLOAT64 }
      - { name: T1_MBAR,    type: FLOAT64 }
      - { name: T2_MBAR,    type: FLOAT64 }
      - { name: CODE1,      type: FLOAT64 }
      - { name: CODE2,      type: FLOAT64 }
      - { name: GPS_SPEED,  type: FLOAT64 }
      - { name: GPS_LAT,    type: FLOAT64 }
      - { name: GPS_LON,    type: FLOAT64 }

  - name: SNCB_STREAM2
    schema:
      - { name: TIME_UTC,   type: UINT64 }
      - { name: DEVICE_ID,  type: UINT64 }
      - { name: VBAT,       type: FLOAT64 }
      - { name: PCFA_MBAR,  type: FLOAT64 }
      - { name: PCFF_MBAR,  type: FLOAT64 }
      - { name: PCF1_MBAR,  type: FLOAT64 }
      - { name: PCF2_MBAR,  type: FLOAT64 }
      - { name: T1_MBAR,    type: FLOAT64 }
      - { name: T2_MBAR,    type: FLOAT64 }
      - { name: CODE1,      type: FLOAT64 }
      - { name: CODE2,      type: FLOAT64 }
      - { name: GPS_SPEED,  type: FLOAT64 }
      - { name: GPS_LAT,   type: FLOAT64 }
      - { name: GPS_LON,   type: FLOAT64 }

physical:
  - logical: SNCB_STREAM
    type: File
    parser_config:
      type: CSV
      field_delimiter: ","
      tuple_delimiter: "\n"
    source_config:
      file_path: "/workspace/Input/input_sncb.csv"

  - logical: SNCB_STREAM2
    type: File
    parser_config:
      type: CSV
      field_delimiter: ","
      tuple_delimiter: "\n"
    source_config:
      file_path: "/workspace/Input/input_sncb.csv"
